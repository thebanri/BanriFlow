version: '3.8'

services:
  banri:
    build: .
    ports:
      - "3005:3005"
    volumes:
      - ~/.kube:/root/.kube:ro # Map local kubeconfig to the container
    environment:
      - KUBECONFIG=/root/.kube/config
      - AI_PROVIDER=${AI_PROVIDER:-gemini}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
    # 'host' mode is often required so the container can reach your local cluster (Minikube/Docker Desktop)
    network_mode: "host"
